<style>
/* ================================================================
   実地指導チェックリスト 専用スタイル
================================================================ */
.cl-progress-wrap {
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--r); padding:1.25rem 1.5rem; margin-bottom:1.5rem;
}
.cl-progress-title {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem;
}
.cl-progress-title h2 { font-size:1.05rem; margin:0; }
.cl-score {
  font-size:1.6rem; font-weight:900; color:var(--coral-dark);
}
.cl-bar-bg {
  background:var(--border); border-radius:999px; height:14px;
  overflow:hidden; margin-bottom:0.4rem;
}
.cl-bar {
  height:100%; border-radius:999px;
  background:linear-gradient(90deg,var(--coral),var(--success));
  transition:width 0.4s ease;
}
.cl-legend {
  display:flex; gap:1rem; font-size:0.75rem;
  color:var(--text-mid); flex-wrap:wrap;
}
.cl-legend span { display:flex; align-items:center; gap:0.3rem; }

/* カテゴリ */
.cl-category { margin-bottom:1.25rem; }
.cl-category-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.65rem 1rem; background:var(--coral-light);
  border-left:5px solid var(--coral); border-radius:0 var(--r-sm) var(--r-sm) 0;
  cursor:pointer; user-select:none; gap:0.5rem;
}
.cl-category-header h3 {
  font-size:0.92rem; margin:0; color:var(--coral-dark);
  display:flex; align-items:center; gap:0.5rem;
}
.cl-cat-score {
  font-size:0.78rem; font-weight:700; color:var(--coral-dark);
  background:#fff; padding:0.15rem 0.6rem; border-radius:999px;
  white-space:nowrap;
}
.cl-category-body { padding:0.5rem 0; display:block; }
.cl-category.collapsed .cl-category-body { display:none; }
.cl-chevron { transition:transform 0.2s; font-size:0.8rem; }
.cl-category.collapsed .cl-chevron { transform:rotate(-90deg); }

/* チェック項目 */
.cl-item {
  display:flex; align-items:flex-start; gap:0.75rem;
  padding:0.6rem 0.75rem; border-radius:var(--r-sm);
  cursor:pointer; transition:background 0.15s; border-bottom:1px solid var(--border);
}
.cl-item:last-child { border-bottom:none; }
.cl-item:hover { background:var(--coral-light); }
.cl-item.checked { background:var(--success-light); }
.cl-item.na { background:var(--blk-sky); opacity:0.7; }

.cl-check {
  width:22px; height:22px; flex-shrink:0;
  border:2px solid var(--border); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  margin-top:0.1rem; transition:all 0.15s; background:#fff;
}
.cl-item.checked .cl-check {
  background:var(--success); border-color:var(--success); color:#fff;
}
.cl-item.na .cl-check {
  background:#b0c8d8; border-color:#b0c8d8; color:#fff;
}

.cl-text { flex:1; }
.cl-text-main { font-size:0.86rem; color:var(--text); line-height:1.5; }
.cl-text-sub  { font-size:0.74rem; color:var(--text-mid); margin-top:0.2rem; line-height:1.4; }

.cl-level {
  font-size:0.63rem; padding:0.1rem 0.4rem; border-radius:999px;
  font-weight:800; flex-shrink:0; align-self:flex-start; margin-top:0.15rem;
}
.level-must    { background:#FDE8E8; color:#B71C1C; }
.level-warning { background:var(--warning-light); color:#7a5a10; }
.level-info    { background:var(--info-light); color:#005a8e; }

/* アクションバー */
.cl-actions {
  display:flex; gap:0.5rem; flex-wrap:wrap;
  margin-bottom:1.25rem; align-items:center;
}
.cl-btn {
  padding:0.4rem 1rem; border-radius:999px; font-size:0.8rem;
  font-weight:700; cursor:pointer; border:2px solid var(--border);
  background:var(--card); color:var(--text-mid); transition:all 0.15s;
}
.cl-btn:hover { border-color:var(--coral-mid); color:var(--coral-dark); }
.cl-btn.primary { background:var(--coral); border-color:var(--coral); color:#fff; }
.cl-btn.danger  { background:var(--danger-light); border-color:var(--danger); color:#B71C1C; }

/* 未チェック一覧 */
.cl-todo-list { margin-top:1rem; }
.cl-todo-item {
  display:flex; align-items:flex-start; gap:0.5rem;
  padding:0.5rem 0.75rem; font-size:0.82rem; border-bottom:1px solid var(--border);
}
.cl-todo-badge {
  font-size:0.63rem; padding:0.1rem 0.4rem; border-radius:999px;
  font-weight:800; flex-shrink:0; margin-top:0.15rem;
}

/* 印刷ボタン */
@media print {
  .site-header,.site-nav,.page-hero,.cl-actions,.cl-btn { display:none!important; }
  .cl-item { page-break-inside:avoid; }
  .cl-category-body { display:block!important; }
}
</style>
</head>

var CHECKLIST = [

      { id:'b03', text:'月額上限管理が正しく行われている', sub:'上限管理事業所の確認・管理結果の記録。上限を超えた場合の対応', level:'must' },
      { id:'b04', text:'返戻・過誤が発生した場合の対応手順が整備されている', sub:'国保連からの返戻通知の確認→原因究明→再請求の手順', level:'warning' },
      { id:'b05', text:'訪問看護：訪問日ごとのサービス提供記録が作成されている', sub:'訪問時間・看護内容・バイタル・担当看護師を記録', level:'must' },
      { id:'b06', text:'居宅介護：サービス提供記録に利用者確認印（署名）がある', sub:'ヘルパーと利用者の両名のサインが法定義務', level:'must' },
      { id:'b07', text:'同一建物減算の対象か確認している', sub:'同一建物居住者が一定数以上の場合は減算。漏れると過誤請求', level:'warning' },
    ]
  },
  {
    id: 'safety', icon: '', title: '安全・緊急対応',
    items: [
      { id:'sa01', text:'緊急時対応マニュアルを整備している', sub:'急変時・救急対応・医療機関への搬送手順。スタッフ全員に周知', level:'must' },
      { id:'sa02', text:'緊急連絡先一覧（利用者・家族・主治医・協力医療機関）が整備されている', sub:'最新情報に更新されていること。各スタッフが確認できる場所に保管', level:'must' },
      { id:'sa03', text:'防火・避難訓練を年2回以上実施している', sub:'消防署への報告。訓練記録の保管。避難経路の掲示', level:'must' },
      { id:'sa04', text:'ヒヤリハット報告書を月1回以上分析・集計している', sub:'件数・内容の集計。スタッフへのフィードバック。再発防止策の立案', level:'warning' },
      { id:'sa05', text:'医療的ケア利用者への対応体制が整備されている', sub:'喀痰吸引等の研修修了者が配置されているか。主治医との連携体制', level:'warning' },
      { id:'sa06', text:'AED・救急セットが整備・点検されている', sub:'設置場所の周知。定期点検の記録', level:'info' },
    ]
  },
];

/* ================================================================
   ローカルストレージキー
================================================================ */
var LS_KEY = 'jichi_checklist_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  document.getElementById('save-msg').textContent = '自動保存しました';
  setTimeout(function(){ document.getElementById('save-msg').textContent=''; }, 2000);
}

/* ================================================================
   レンダリング
================================================================ */
function renderChecklist() {
  var state = loadState();
  var wrap  = document.getElementById('checklist');
  wrap.innerHTML = '';

  CHECKLIST.forEach(function(cat) {
    var total   = cat.items.length;
    var checked = cat.items.filter(function(it){ return state[it.id]==='checked'; }).length;
    var na      = cat.items.filter(function(it){ return state[it.id]==='na'; }).length;
    var done    = checked + na;

    var catEl = document.createElement('div');
    catEl.className = 'card cl-category';
    catEl.id = 'cat-' + cat.id;

    catEl.innerHTML = [
      '<div class="cl-category-header" onclick="toggleCategory(\''+cat.id+'\')">',
      '  <h3>' + cat.icon + ' ' + cat.title + '</h3>',
      '  <div style="display:flex;align-items:center;gap:0.5rem;">',
      '    <span class="cl-cat-score">' + done + '/' + total + '</span>',
      '    <span class="cl-chevron">▼</span>',
      '  </div>',
      '</div>',
      '<div class="cl-category-body">',
      cat.items.map(function(item) {
        var st = state[item.id] || '';
        var cls = st === 'checked' ? ' checked' : st === 'na' ? ' na' : '';
        var icon = st === 'checked' ? '✓' : st === 'na' ? '―' : '';
        var levelLabel = { must:'必須', warning:'要注意', info:'推奨' }[item.level];
        return [
          '<div class="cl-item' + cls + '" id="item-' + item.id + '" onclick="toggleItem(\'' + item.id + '\')">',
          '  <div class="cl-check">' + icon + '</div>',
          '  <div class="cl-text">',
          '    <div class="cl-text-main">' + item.text + '</div>',
          item.sub ? '<div class="cl-text-sub">' + item.sub + '</div>' : '',
          '  </div>',
          '  <span class="cl-level level-' + item.level + '">' + levelLabel + '</span>',
          '</div>',
        ].join('');
      }).join(''),
      '</div>',
    ].join('');

    wrap.appendChild(catEl);
  });

  updateProgress(state);
}

/* ================================================================
   インタラクション
================================================================ */
function toggleItem(id) {
  var state = loadState();
  var cur   = state[id] || '';
  // 未チェック → チェック済み → N/A → 未チェック
  if      (cur === '')        state[id] = 'checked';
  else if (cur === 'checked') state[id] = 'na';
  else                        delete state[id];
  saveState(state);
  var el = document.getElementById('item-' + id);
  if (state[id] === 'checked') {
    el.className = 'cl-item checked';
    el.querySelector('.cl-check').textContent = '✓';
  } else if (state[id] === 'na') {
    el.className = 'cl-item na';
    el.querySelector('.cl-check').textContent = '―';
  } else {
    el.className = 'cl-item';
    el.querySelector('.cl-check').textContent = '';
  }
  updateProgress(state);
  updateCatScore();
}

function updateCatScore() {
  var state = loadState();
  CHECKLIST.forEach(function(cat) {
    var done  = cat.items.filter(function(it){ return state[it.id]; }).length;
    var total = cat.items.length;
    var scoreEl = document.querySelector('#cat-' + cat.id + ' .cl-cat-score');
    if (scoreEl) scoreEl.textContent = done + '/' + total;
  });
}

function toggleCategory(id) {
  document.getElementById('cat-' + id).classList.toggle('collapsed');
}

function updateProgress(state) {
  var allItems = CHECKLIST.flatMap(function(c){ return c.items; });
  var total    = allItems.length;
  var done     = allItems.filter(function(it){ return state[it.id]; }).length;
  var pct      = Math.round(done / total * 100);
  document.getElementById('score-pct').textContent  = pct + '%';
  document.getElementById('score-num').textContent  = done + '/' + total;
  document.getElementById('progress-bar').style.width = pct + '%';
  // 色変更
  var bar = document.getElementById('progress-bar');
  if      (pct >= 90) bar.style.background = 'linear-gradient(90deg,#7DC49A,#4CAF50)';
  else if (pct >= 60) bar.style.background = 'linear-gradient(90deg,var(--coral),#F0BE6A)';
  else                bar.style.background = 'linear-gradient(90deg,var(--danger),var(--coral))';
}

function checkAll() {
  var state = loadState();
  CHECKLIST.forEach(function(cat) {
    cat.items.forEach(function(it){ state[it.id] = 'checked'; });
  });
  saveState(state);
  renderChecklist();
}

function resetAll() {
  if (!confirm('全てのチェックをリセットしますか？')) return;
  localStorage.removeItem(LS_KEY);
  renderChecklist();
}

function showTodo() {
  var state   = loadState();
  var mustItems = [], warnItems = [], infoItems = [];

  CHECKLIST.forEach(function(cat) {
    cat.items.forEach(function(item) {
      if (!state[item.id]) {
        var entry = { cat: cat.title, text: item.text, level: item.level };
        if (item.level === 'must')    mustItems.push(entry);
        else if (item.level === 'warning') warnItems.push(entry);
        else infoItems.push(entry);
      }
    });
  });

  var html = '';
  function renderSection(items, label, cls) {
    if (!items.length) return '';
    return '<div style="font-weight:700;font-size:0.82rem;margin:0.75rem 0 0.3rem;color:var(--text-mid);">' + label + '（' + items.length + '件）</div>' +
      items.map(function(it) {
        return '<div class="cl-todo-item">' +
          '<span class="cl-todo-badge level-' + it.level + '">' + it.cat.slice(0,4) + '</span>' +
          '<span style="font-size:0.83rem;">' + it.text + '</span></div>';
      }).join('');
  }

  html += renderSection(mustItems, '● 必須', 'must');
  html += renderSection(warnItems, '● 要注意', 'warning');
  html += renderSection(infoItems, '● 推奨', 'info');

  if (!html) html = '<div style="text-align:center;padding:2rem;color:var(--success);font-weight:700;">全項目完了しています！</div>';

  document.getElementById('todo-content').innerHTML = html;
  document.getElementById('todo-modal').style.display = 'block';
}

// 初期化
renderChecklist();
</script>
