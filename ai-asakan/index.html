<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI朝刊 アーカイブ | beqd1106.com</title>
<meta name="description" content="Claude・Gemini・ChatGPTの最新動向を毎朝お届けする「AI朝刊」のバックナンバー。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a2438'/%3E%3Ctext x='16' y='22' font-size='15' text-anchor='middle' fill='%23f4efe6' font-family='serif'%3E朝%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --paper: #ffffff;
  --ink: #2b2f3a;
  --ink-soft: rgba(43, 47, 58, 0.62);
  --navy: #1a2438;
  --accent: #2563eb;
  --line: rgba(43, 47, 58, 0.12);
  --ease: cubic-bezier(0.21, 0.51, 0.51, 1);
  --serif: 'Noto Serif JP', serif;
  --sans: 'Noto Sans JP', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1.9;
  font-feature-settings: 'palt';
  -webkit-font-smoothing: antialiased;
}
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
header {
  background: var(--navy);
  color: #f4efe6;
  padding: clamp(2rem, 5vw, 3.2rem) clamp(1.2rem, 4vw, 3rem) clamp(1.6rem, 4vw, 2.4rem);
}
.masthead { max-width: 1080px; margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; }
h1 {
  font-family: var(--serif); font-weight: 700;
  font-size: clamp(1.7rem, 4.5vw, 2.6rem);
  letter-spacing: 0.22em;
}
h1 small { display: block; font-family: var(--sans); font-weight: 300; font-size: 0.78rem; letter-spacing: 0.28em; opacity: 0.7; margin-top: 0.5rem; }
.masthead .home { color: rgba(244,239,230,0.7); text-decoration: none; font-size: 0.74rem; letter-spacing: 0.2em; border-bottom: 1px solid transparent; transition: 0.3s; }
.masthead .home:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.5); }

.layout {
  max-width: 1080px; margin: 0 auto;
  display: grid; grid-template-columns: 300px 1fr;
  gap: clamp(1.2rem, 3vw, 2.4rem);
  padding: clamp(1.2rem, 3vw, 2.4rem) clamp(1.2rem, 4vw, 3rem) clamp(3rem, 8vw, 5rem);
  align-items: start;
}
@media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

.list-panel { position: sticky; top: 1.2rem; }
@media (max-width: 820px) { .list-panel { position: static; } }
.list-head { font-size: 0.68rem; letter-spacing: 0.32em; color: var(--ink-soft); margin: 0.4rem 0 0.9rem 0.2rem; }
.issue-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; max-height: 72vh; overflow-y: auto; padding-right: 4px; }
@media (max-width: 820px) { .issue-list { max-height: 38vh; } }
.issue-list button {
  width: 100%; text-align: left; cursor: pointer;
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  padding: 0.85rem 1rem;
  font-family: var(--sans); font-weight: 400; color: var(--ink);
  letter-spacing: 0.03em; line-height: 1.6; font-size: 0.8rem;
  transition: transform 0.25s var(--ease), box-shadow 0.25s, border-color 0.25s;
}
.issue-list button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,36,56,0.10); }
.issue-list button.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.issue-list .d { font-family: var(--serif); font-weight: 700; color: var(--navy); font-size: 0.86rem; letter-spacing: 0.1em; display: block; }
.issue-list .s { color: var(--ink-soft); display: block; margin-top: 0.15rem; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.reader {
  background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
  padding: clamp(1.4rem, 4vw, 2.8rem);
  min-height: 50vh;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
}
.reader.show { opacity: 1; transform: translateY(0); }
.reader .subject {
  font-family: var(--serif); font-weight: 700;
  font-size: clamp(1.08rem, 2.6vw, 1.45rem);
  letter-spacing: 0.06em; line-height: 1.7;
  padding-bottom: 1.1rem; margin-bottom: 1.6rem;
  border-bottom: 2px solid var(--navy);
}
.reader .body { font-size: clamp(0.85rem, 1.7vw, 0.94rem); }
.reader .body h2 {
  font-family: var(--serif); font-weight: 700;
  font-size: 1.12em; letter-spacing: 0.1em;
  color: var(--navy);
  margin: 2.1em 0 0.8em;
  padding-left: 0.75em; border-left: 4px solid var(--accent);
  line-height: 1.6;
}
.reader .body h3 { font-weight: 500; font-size: 1em; margin: 1.5em 0 0.4em; color: var(--navy); }
.reader .body p { margin: 0.5em 0; }
.reader .body a { color: var(--accent); word-break: break-all; text-decoration: none; border-bottom: 1px solid rgba(37,99,235,0.3); transition: border-color 0.25s; }
.reader .body a:hover { border-bottom-color: var(--accent); }
.reader .meta { margin-top: 2.4rem; padding-top: 1rem; border-top: 1px solid var(--line); font-size: 0.7rem; letter-spacing: 0.18em; color: var(--ink-soft); }
.empty { color: var(--ink-soft); font-size: 0.85rem; }

footer { text-align: center; padding: 2rem 1rem 2.6rem; font-size: 0.66rem; letter-spacing: 0.24em; color: var(--ink-soft); }
footer a { color: inherit; }
@media (prefers-reduced-motion: reduce) { * { transition-duration: 0.01ms !important; } }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <h1>AI朝刊<small>CLAUDE / GEMINI / CHATGPT — DAILY ARCHIVE</small></h1>
    <a class="home" href="/">beqd1106.com</a>
  </div>
</header>

<div class="layout">
  <aside class="list-panel">
    <p class="list-head">BACK NUMBERS</p>
    <ul class="issue-list" id="issueList"><li class="empty">読み込み中…</li></ul>
  </aside>
  <main class="reader" id="reader">
    <p class="empty">号を選択してください。</p>
  </main>
</div>

<footer>AI朝刊 — 毎朝自動調査・自動配信 / POWERED BY <a href="https://claude.com/claude-code" target="_blank" rel="noopener">CLAUDE CODE</a></footer>

<script>
(() => {
  const listEl = document.getElementById('issueList');
  const reader = document.getElementById('reader');
  let issues = [];

  const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function render(text, subject, date) {
    const lines = text.replace(/\r\n/g, '\n').split('\n');
    let html = '', para = [];
    const flush = () => { if (para.length) { html += '<p>' + para.join('<br>') + '</p>'; para = []; } };
    for (let raw of lines) {
      const line = raw.trimEnd();
      if (/^=+$/.test(line.trim())) { continue; }                      // ===== 区切りは捨てる
      if (line.trim() === '') { flush(); continue; }
      let safe = esc(line);
      safe = safe.replace(/(https?:\/\/[^\s&]+(?:&amp;[^\s&]+)*)/g, m => {
        const url = m.replace(/&amp;/g, '&');
        return '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + m + '</a>';
      });
      if (/^■/.test(line.trim()) || /^\d+\.\s*(Anthropic|Google|OpenAI)/.test(line.trim())) {
        flush(); html += '<h2>' + safe.replace(/^■\s*/, '') + '</h2>';
      } else if (/^【\d+】/.test(line.trim())) {
        flush(); html += '<h3>' + safe + '</h3>';
      } else {
        para.push(safe);
      }
    }
    flush();
    reader.classList.remove('show');
    setTimeout(() => {
      reader.innerHTML =
        '<div class="subject">' + esc(subject) + '</div>' +
        '<div class="body">' + html + '</div>' +
        '<div class="meta">ISSUE ' + esc(date) + ' / AI朝刊</div>';
      reader.classList.add('show');
    }, 120);
  }

  async function open(issue, btn) {
    document.querySelectorAll('.issue-list button').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    try {
      const res = await fetch('issues/' + issue.date + '.txt');
      if (!res.ok) throw new Error(res.status);
      render(await res.text(), issue.subject, issue.date);
      if (history.replaceState) history.replaceState(null, '', '#' + issue.date);
    } catch (e) {
      reader.innerHTML = '<p class="empty">この号の読み込みに失敗しました（' + esc(String(e.message)) + '）</p>';
      reader.classList.add('show');
    }
  }

  fetch('issues/index.json')
    .then(r => r.json())
    .then(data => {
      issues = data.sort((a, b) => b.date.localeCompare(a.date));
      listEl.innerHTML = '';
      issues.forEach(issue => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.innerHTML = '<span class="d">' + esc(issue.date) + '</span><span class="s">' + esc(issue.subject.replace(/^【AI朝刊】[\d-]*\s*/, '')) + '</span>';
        btn.addEventListener('click', () => open(issue, btn));
        li.appendChild(btn);
        listEl.appendChild(li);
      });
      const hash = location.hash.replace('#', '');
      const target = issues.find(i => i.date === hash) || issues[0];
      if (target) {
        const idx = issues.indexOf(target);
        open(target, listEl.children[idx] && listEl.children[idx].querySelector('button'));
      }
    })
    .catch(() => { listEl.innerHTML = '<li class="empty">バックナンバーの読み込みに失敗しました。</li>'; });
})();
</script>
</body>
</html>
