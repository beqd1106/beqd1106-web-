<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AWS合格ナビ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231B2A4A'/%3E%3Ctext x='32' y='35' font-family='Arial,sans-serif' font-size='22' font-weight='bold' fill='white' text-anchor='middle'%3EAWS%3C/text%3E%3Crect x='16' y='42' width='32' height='4' rx='2' fill='%23F39220'/%3E%3C/svg%3E">
<script src="data.js"></script>
<style>
:root{
  --bg:#F7F3EA; --card:#FFFFFF; --navy:#1B2A4A; --blue:#2D7FF0; --blueSoft:#EAF1FE;
  --orange:#F39220; --orangeSoft:#FBEAD2; --teal:#18A0A0; --green:#2BA664; --red:#E0533D;
  --ink:#29303A; --inkSoft:#8A8170; --line:#EBE3D4;
  --r-card:18px; --r-chip:10px; --r-btn:14px;
  --shadow:0 4px 14px rgba(27,42,74,.07);
  --maxw:560px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:inherit;}
.ic{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none;}
.ic.fill{fill:currentColor;stroke:none;}

/* レイアウト */
#app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg);
  background-image:linear-gradient(to bottom,rgba(243,146,32,.05),transparent 38%);position:relative;}
.screen{padding:0 16px 28px;}
.scroll{padding-bottom:96px;}
.with-appbar{padding-top:8px;}

/* アプリバー（サブ画面） */
.appbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:rgba(247,243,234,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);}
.appbar h1{font-size:16px;font-weight:700;color:var(--navy);margin:0;flex:1;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appbar .iconbtn{font-size:20px;color:var(--navy);width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
.appbar .spacer{width:34px;}

/* ボトムタブ */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);
  display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom);}
.tabbar button{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;font-weight:600;color:var(--inkSoft);}
.tabbar button .ic{font-size:21px;}
.tabbar button.active{color:var(--orange);}

/* カード */
.card{background:var(--card);border-radius:var(--r-card);padding:16px;box-shadow:var(--shadow);
  margin-bottom:12px;}
.card.tight{padding:12px;}
.card.sel{box-shadow:0 0 0 2px var(--orange),var(--shadow);}

/* タイポ */
.title{font-size:24px;font-weight:700;color:var(--navy);margin:0;}
.heading{font-size:18px;font-weight:700;color:var(--ink);margin:0;}
.section-h{font-size:17px;font-weight:700;color:var(--navy);margin:4px 0 8px;}
.cap{font-size:13px;color:var(--inkSoft);}
.muted{color:var(--inkSoft);}
.tiny{font-size:11px;color:var(--inkSoft);}

/* ボタン */
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px;font-size:16px;font-weight:700;color:#fff;background:var(--orange);
  border-radius:var(--r-btn);}
.btn-primary:disabled{background:rgba(138,129,112,.4);cursor:default;}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:14px;font-size:16px;font-weight:600;color:var(--blue);background:var(--blueSoft);
  border-radius:var(--r-btn);}
.btn-danger{width:100%;padding:14px;font-size:15px;font-weight:600;color:var(--red);
  background:rgba(224,83,61,.08);border-radius:var(--r-btn);}
.row-actions{display:flex;gap:12px;}
.row-actions .btn-secondary{max-width:130px;}

/* チップ */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;
  font-size:12px;font-weight:600;}
.tag{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:500;}

/* プログレスバー */
.bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden;}
.bar>span{display:block;height:100%;background:var(--blue);border-radius:999px;transition:width .3s;}

/* スコアリング */
.ring{position:relative;display:flex;align-items:center;justify-content:center;}
.ring svg{transform:rotate(-90deg);}
.ring .ring-c{position:absolute;text-align:center;}
.ring .ring-v{font-size:30px;font-weight:700;color:var(--navy);line-height:1.1;}
.ring .ring-cap{font-size:12px;color:var(--inkSoft);}

/* リスト行 */
.list-row{display:flex;align-items:center;gap:12px;}
.iconbox{display:flex;align-items:center;justify-content:center;color:#fff;border-radius:10px;flex:none;}
.flex{display:flex;}.center{align-items:center;}.between{justify-content:space-between;}
.col{display:flex;flex-direction:column;}.gap4{gap:4px;}.gap6{gap:6px;}.gap8{gap:8px;}.gap12{gap:12px;}
.grow{flex:1;min-width:0;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}.mb8{margin-bottom:8px;}
.wrap{white-space:normal;word-break:break-word;}

/* オンボーディング進捗 */
.steps{display:flex;gap:6px;padding:12px 8px 0;}
.steps span{flex:1;height:5px;border-radius:999px;background:var(--line);}
.steps span.on{background:var(--orange);}

/* 選択行 */
.selrow{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--r-chip);
  background:var(--card);border:1px solid var(--line);width:100%;text-align:left;}
.selrow.on{background:var(--orangeSoft);border-color:var(--orange);}
.selrow .ic{font-size:20px;color:var(--line);}
.selrow.on .ic{color:var(--orange);}

/* 入力 */
.field-label{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;display:block;}
.text-input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-chip);
  font-size:15px;background:#fff;color:var(--ink);}
.text-input:focus{outline:none;border-color:var(--blue);}
.searchbox{display:flex;align-items:center;gap:8px;padding:11px 12px;background:var(--card);
  border-radius:var(--r-chip);box-shadow:var(--shadow);}
.searchbox input{border:none;outline:none;flex:1;font-size:15px;background:transparent;}
.searchbox .ic{color:var(--inkSoft);font-size:18px;}
input[type=range]{width:100%;accent-color:var(--orange);}
input[type=date]{padding:9px 12px;border:1px solid var(--line);border-radius:var(--r-chip);font-size:15px;}
.switch{position:relative;width:46px;height:28px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.switch .sl{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:.2s;}
.switch .sl:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch input:checked+.sl{background:var(--blue);}
.switch input:checked+.sl:before{transform:translateX(18px);}

/* クイック4タイル */
.quad{display:flex;gap:12px;}
.quad>button{flex:1;background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);
  padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:7px;}
.tile-ic{position:relative;width:54px;height:54px;border-radius:16px;background:var(--orangeSoft);
  color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:22px;}
.tile-ic .badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;
  background:var(--red);color:#fff;font-size:11px;font-weight:700;border-radius:999px;
  display:flex;align-items:center;justify-content:center;}
.quad .tlabel{font-size:12px;font-weight:600;color:var(--ink);}

/* カテゴリグリッド */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid2 .card{margin:0;}

/* 選択肢 */
.choice{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;padding:12px;
  border-radius:var(--r-chip);background:var(--card);border:1.2px solid var(--line);font-size:15px;}
.choice .ic{font-size:20px;color:var(--line);margin-top:1px;}
.choice.sel{background:var(--blueSoft);border-color:var(--blue);}
.choice.sel .ic{color:var(--blue);}
.choice.correct{background:rgba(43,166,100,.10);border-color:var(--green);}
.choice.correct .ic{color:var(--green);}
.choice.wrong{background:rgba(224,83,61,.10);border-color:var(--red);}
.choice.wrong .ic{color:var(--red);}

/* 下部固定アクション */
.bottombar{position:sticky;bottom:0;padding:14px 16px;background:rgba(247,243,234,.9);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);}

/* カレンダー */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cal .wd{font-size:12px;color:var(--inkSoft);padding:4px 0;}
.cal .d{height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;position:relative;}
.cal .d.s{color:#fff;}
.cal .d.s:before{content:"";position:absolute;width:32px;height:32px;border-radius:50%;background:var(--orange);z-index:0;}
.cal .d.t:before{content:"";position:absolute;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--blue);}
.cal .d span{position:relative;z-index:1;font-weight:600;}

/* バッジ */
.badges{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.bdg{width:84px;flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.bdg .circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}
.bdg .circle.on{background:var(--orangeSoft);color:var(--orange);}
.bdg .circle.off{background:rgba(235,227,212,.5);color:rgba(138,129,112,.5);}
.bdg .blbl{font-size:11px;}
.bdg.on .blbl{color:var(--ink);}.bdg.off{opacity:.6;}.bdg.off .blbl{color:var(--inkSoft);}

.divider{height:1px;background:var(--line);margin:4px 0;}
.empty{text-align:center;padding:48px 16px;color:var(--inkSoft);}
.empty .ic{font-size:40px;color:rgba(138,129,112,.5);}
.empty .et{font-size:16px;font-weight:700;color:var(--ink);margin:10px 0 4px;}

/* ワードマーク */
.wordmark{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 4px;}
.wordmark .wm{font-size:30px;font-weight:800;color:var(--navy);line-height:1;}
.wordmark .wm em{font-weight:400;font-style:normal;color:rgba(27,42,74,.8);}
.wordmark .ul{width:132px;height:3px;background:var(--orange);border-radius:999px;margin-top:3px;}
.wordmark .iconbtn{width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  color:var(--navy);font-size:18px;display:flex;align-items:center;justify-content:center;}

/* セット結果バナー */
.result-banner{display:flex;align-items:center;gap:12px;justify-content:center;text-align:left;
  padding:14px 18px;border-radius:var(--r-card);margin:16px 0 4px;}
.result-banner.perfect{background:var(--orangeSoft);color:var(--orange);animation:pop .4s ease;}
.result-banner.clear{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green);animation:pop .4s ease;}
.result-banner.miss{background:var(--blueSoft);color:var(--navy);}
.result-banner .cap{color:var(--inkSoft);}
@keyframes pop{0%{transform:scale(.85);opacity:0;}60%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}

/* セットカード */
.setcard{display:block;width:100%;text-align:left;}
.setcard .badge-clear{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  color:var(--green);background:color-mix(in srgb,var(--green) 12%,transparent);padding:3px 8px;border-radius:999px;}

/* 用語ツールチップ */
.gloss{border-bottom:1px dashed var(--blue);cursor:help;color:inherit;}
#gtip{position:fixed;z-index:100;max-width:250px;background:var(--navy);color:#fff;
  font-size:12.5px;line-height:1.65;padding:9px 12px;border-radius:10px;
  box-shadow:0 8px 24px rgba(27,42,74,.28);opacity:0;visibility:hidden;
  transition:opacity .12s ease;pointer-events:none;}
#gtip.show{opacity:1;visibility:visible;}
#gtip .gt{font-weight:700;display:block;margin-bottom:3px;color:var(--orange);}

.fade{animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   AWS合格ナビ — Web版（オフライン）
   iOSアプリ（SwiftUI）の全画面・ロジックを移植。
   進捗は localStorage に保存（SwiftDataの代替）。
   ============================================================ */

/* ---------- アイコン（インラインSVG / 絵文字不使用） ---------- */
const P = {
  cloud:'<path d="M17.5 18a4.5 4.5 0 0 0 0-9 6.5 6.5 0 0 0-12.4 1.6A3.6 3.6 0 0 0 6 18z"/>',
  shield:'<path d="M12 3l7 3v5c0 4.6-3.1 7.6-7 9-3.9-1.4-7-4.4-7-9V6z"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5z"/><path d="M3 13l9 5 9-5"/>',
  yen:'<path d="M8 4l4 6 4-6"/><path d="M12 10v10"/><path d="M8 13h8"/><path d="M8 16.5h8"/>',
  list:'<path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><path d="M4 6l1 1 2-2"/><path d="M4 12l1 1 2-2"/><path d="M4 18l1 1 2-2"/>',
  book:'<path d="M6 3h12a1 1 0 0 1 1 1v15a1 1 0 0 0-1-1H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M19 18a2 2 0 0 0-2 2H6"/>',
  cards:'<rect x="7" y="3" width="13" height="13" rx="2"/><path d="M16 16v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2"/>',
  refresh:'<path d="M21 12a9 9 0 1 1-2.6-6.3"/><path d="M21 4v5h-5"/>',
  star:'<path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8-5.2-2.7-5.2 2.7 1-5.8L4.5 9.7l5.9-.9z"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
  flame:'<path d="M12 3c2.2 3.6 5 5 5 9a5 5 0 0 1-10 0c0-2 .9-3.2 2-4.2 0 1.8 1 2.8 2.6 2.8-1.8-2-1.2-5 .4-7.6z"/>',
  calendar:'<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>',
  chart:'<path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/>',
  cr:'<path d="M9 6l6 6-6 6"/>',
  cl:'<path d="M15 6l-6 6 6 6"/>',
  ar:'<path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>',
  check:'<path d="M5 12.5l4.5 4.5L19 6"/>',
  map:'<path d="M9 4L3 6.5v14L9 18l6 2.5 6-2.5v-14L15 6.5z"/><path d="M9 4v14M15 6.5v14"/>',
  bolt:'<path d="M13 2L4 14h7l-1 8 9-12h-7z"/>',
  cap:'<path d="M3 9l9-5 9 5-9 5z"/><path d="M21 9v5"/><path d="M7 11v5c0 1.1 2.2 2 5 2s5-.9 5-2v-5"/>',
  sparkles:'<path d="M12 3l1.6 4.9L18.5 9.5l-4.9 1.6L12 16l-1.6-4.9L5.5 9.5l4.9-1.6z"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>',
  bulb:'<path d="M9 18h6M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.5 1 2.5h6c0-1 .3-1.8 1-2.5A6 6 0 0 0 12 3z"/>',
  lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
  play:'<path d="M7 4l13 8-13 8z" fill="currentColor" stroke="none"/>',
  timer:'<circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/>',
  x:'<path d="M6 6l12 12M18 6L6 18"/>',
  seal:'<circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/>',
  alert:'<path d="M12 3L2.5 20h19z"/><path d="M12 10v4M12 17h.01"/>',
  person:'<circle cx="12" cy="7" r="3"/><path d="M6 21c0-3.3 2.7-6 6-6s6 2.7 6 6"/>',
  wrench:'<path d="M15 5a4 4 0 0 0 5 5l-9 9-5-5z"/>',
  walk:'<circle cx="13" cy="4" r="2"/><path d="M11 8l3 2 1 4M14 10l-4 4 1 6M14 14l4 2"/>',
  trophy:'<path d="M8 4h8v5a4 4 0 0 1-8 0z"/><path d="M8 5H5v2a3 3 0 0 0 3 3M16 5h3v2a3 3 0 0 1-3 3M10 14h4M9 20h6M12 14v6"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
  home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',
  stack:'<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 9h16M4 14h16"/>',
  hundred:'<circle cx="12" cy="12" r="9"/><path d="M8 9v6M14 9h2v6M14 9a2 2 0 0 1 2 2M16 13a2 2 0 0 1-2 2"/>',
  calcheck:'<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4M9 15l2 2 4-4"/>',
  minus:'<circle cx="12" cy="12" r="9"/><path d="M8 12h8"/>',
  square:'<rect x="4" y="4" width="16" height="16" rx="3"/>',
  checksq:'<rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l2.5 2.5L16 9"/>',
  dot:'<circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>'
};
function icon(n,cls){return '<svg class="ic'+(cls?' '+cls:'')+'" viewBox="0 0 24 24">'+(P[n]||P.dot)+'</svg>';}

/* ---------- ドメイン定義（ExamDomain移植） ---------- */
const DOMAINS = ['cloudConcepts','security','technology','billing'];
const DOM = {
  cloudConcepts:{weight:.24,title:'クラウドの概念',short:'概念',color:'var(--blue)',icon:'cloud'},
  security:{weight:.30,title:'セキュリティとコンプライアンス',short:'セキュリティ',color:'var(--navy)',icon:'shield'},
  technology:{weight:.34,title:'クラウドテクノロジーとサービス',short:'サービス',color:'var(--orange)',icon:'layers'},
  billing:{weight:.12,title:'請求・料金・サポート',short:'料金',color:'var(--teal)',icon:'yen'},
};
const domPct = d => Math.round(DOM[d].weight*100);

/* 経験レベル / プラン（UserModels移植） */
const EXP = {
  noneAtAll:{title:'まったくの初心者',detail:'AWS・ITともにほぼ未経験'},
  someIT:{title:'IT経験あり',detail:'ITの基礎知識はある（非クラウド）'},
  someCloud:{title:'クラウド経験あり',detail:'AWSや他クラウドを少し触った'},
};
const EXP_ORDER = ['noneAtAll','someIT','someCloud'];
const PLAN = {
  intensive4:{weeks:4,title:'短期集中プラン',daily:60},
  standard8:{weeks:8,title:'標準プラン',daily:30},
  relaxed12:{weeks:12,title:'ゆっくりプラン',daily:20},
  custom6:{weeks:6,title:'しっかりプラン',daily:45},
};
const PLAN_ORDER = ['intensive4','standard8','relaxed12','custom6'];
const planSub = p => PLAN[p].weeks+'週間で合格を目指す';
const recommendedPlan = e => e==='noneAtAll'?'standard8':(e==='someIT'?'custom6':'intensive4');

/* ---------- データ（ContentRepository移植） ---------- */
const D = window.APP_DATA;
const Q = D.questions, TERMS = D.terms, LESSONS = D.lessons, SERVICES = D.services;
const QBYID = Object.fromEntries(Q.map(q=>[q.id,q]));
const repo = {
  question:id=>QBYID[id],
  questions:d=>Q.filter(q=>q.domain===d),
  lessons:d=>LESSONS.filter(l=>l.domain===d),
  terms:d=>TERMS.filter(t=>t.domain===d),
  searchTerms(k){k=(k||'').trim().toLowerCase();if(!k)return TERMS;
    return TERMS.filter(t=>t.term.toLowerCase().includes(k)||t.shortDescription.toLowerCase().includes(k)||t.beginnerExplanation.toLowerCase().includes(k));},
  buildMockExam(count){
    let picked=[];
    for(const d of DOMAINS){
      const target=Math.max(1,Math.round(count*DOM[d].weight));
      picked=picked.concat(shuffle(repo.questions(d)).slice(0,target));
    }
    if(picked.length>count){picked=shuffle(picked).slice(0,count);}
    else if(picked.length<count){
      const ids=new Set(picked.map(q=>q.id));
      const rest=shuffle(Q.filter(q=>!ids.has(q.id))).slice(0,count-picked.length);
      picked=picked.concat(rest);
    }
    return shuffle(picked);
  }
};
const isMulti = q => q.correctAnswers.length>1;
const isCorrectSel = (q,sel)=>{const a=new Set(q.correctAnswers);return sel.size===a.size&&[...sel].every(i=>a.has(i));};

/* ---------- 用語集（初心者向けツールチップ） ---------- */
/* 長い語を優先マッチ（「Amazon EC2」を「EC2」より先に拾う） */
const GLOSS = (D.glossary||[]).slice().sort((a,b)=>b.term.length-a.term.length);
function gAlnum(ch){return ch>='0'&&ch<='9'||ch>='A'&&ch<='Z'||ch>='a'&&ch<='z';}
/* 平文を受け取り、用語を初回出現のみ <span class="gloss"> で包んだ「エスケープ済みHTML」を返す */
function glossify(raw){
  if(raw==null)return '';
  const s=String(raw),n=s.length,used=new Set();
  let out='',i=0;
  while(i<n){
    let hit=false;
    for(let gi=0;gi<GLOSS.length;gi++){
      if(used.has(gi))continue;
      const key=GLOSS[gi].term,kl=key.length;
      if(s.substr(i,kl)!==key)continue;
      const leftBad=gAlnum(key[0])&&i>0&&gAlnum(s[i-1]);
      const rightBad=gAlnum(key[kl-1])&&i+kl<n&&gAlnum(s[i+kl]);
      if(leftBad||rightBad)continue;
      out+='<span class="gloss" data-gi="'+gi+'">'+esc(key)+'</span>';
      used.add(gi);i+=kl;hit=true;break;
    }
    if(!hit){out+=esc(s[i]);i++;}
  }
  return out;
}

/* ---------- 10問セット（既存問題を分野ごとに均等分割） ---------- */
/* MVP：既存問題をdomainごとに約10問のセットへ。将来は問題側のsetNameで定義に置換。 */
function buildSets(){
  const sets=[];
  for(const d of DOMAINS){
    const qs=repo.questions(d);
    const total=qs.length;
    const numSets=Math.max(1,Math.round(total/10));
    const base=Math.floor(total/numSets), extra=total%numSets;
    let idx=0;
    for(let i=0;i<numSets;i++){
      const size=base+(i<extra?1:0);
      const slice=qs.slice(idx,idx+size); idx+=size;
      sets.push({
        id:'set-'+d+'-'+(i+1), domain:d, name:DOM[d].short+'セット '+(i+1),
        questionIds:slice.map(q=>q.id), count:slice.length,
        passLine:Math.ceil(slice.length*0.8),
        estMin:Math.max(5,Math.round(slice.length*0.8))
      });
    }
  }
  return sets;
}
const SETS=buildSets();
const SETS_BY_DOMAIN=Object.fromEntries(DOMAINS.map(d=>[d,SETS.filter(s=>s.domain===d)]));
const SET_BY_ID=Object.fromEntries(SETS.map(s=>[s.id,s]));

/* ---------- 汎用ヘルパ ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function startOfDay(d){d=new Date(d);return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function dayKey(d){d=startOfDay(d);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function diffDays(a,b){return Math.floor((startOfDay(b)-startOfDay(a))/86400000);}
function addDays(d,n){d=startOfDay(d);return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n);}
function fmtToday(){const w=['日','月','火','水','木','金','土'];const d=new Date();return (d.getMonth()+1)+'月'+d.getDate()+'日 ('+w[d.getDay()]+')';}
function fmtDate(d){d=new Date(d);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function fmtShort(d){d=new Date(d);return (d.getMonth()+1)+'/'+d.getDate();}

/* ---------- 合格可能性（PassProbability移植） ---------- */
const Pass = {
  score(inp){
    if(inp.totalAnswered<=0)return 0;
    let weighted=0;
    for(const d of DOMAINS)weighted+=(inp.rates[d]||0)*DOM[d].weight;
    let total=weighted*50;
    total+=inp.mock!=null?Math.min(1,inp.mock/700)*25:0;
    total+=clamp(inp.reviewRate,0,1)*15;
    total+=Math.min(1,inp.streak/14)*10;
    if(inp.totalAnswered<20)total=Math.min(total,35);
    else if(inp.totalAnswered<50)total=Math.min(total,60);
    return Math.round(total);
  },
  label(s){return s>=80?'合格圏が見えています':s>=60?'あと一歩。弱点を詰めましょう':s>=40?'基礎固めを継続しましょう':'まずは毎日の学習から';}
};

/* ---------- 間隔反復（SpacedRepetition移植） ---------- */
const SR = {
  intervals:[1,3,7,14,30],
  next(level,correct,now){
    now=now||new Date();
    const nl=correct?Math.min(level+1,4):0;
    const days=SR.intervals[clamp(nl,0,4)];
    return {level:nl,nextDate:addDays(now,days)};
  }
};

/* ---------- ロードマップ（PlanFactory移植） ---------- */
const BASE8 = [
  {title:'クラウドの基礎',detail:'クラウドとは何か／AWSとは／クラウドの価値',domains:['cloudConcepts']},
  {title:'主要サービスの全体像',detail:'EC2・S3・RDS・Lambdaなど中心サービスの役割',domains:['technology']},
  {title:'セキュリティの基本',detail:'責任共有モデル・IAM・コンプライアンス',domains:['security']},
  {title:'ネットワークと配信',detail:'VPC・CloudFront・Route 53・グローバルインフラ',domains:['technology']},
  {title:'料金とサポート',detail:'料金モデル・請求・コスト管理・サポートプラン',domains:['billing']},
  {title:'分野別の問題演習',detail:'4分野を横断して演習し、苦手を洗い出す',domains:DOMAINS},
  {title:'模擬試験と弱点補強',detail:'模試→間違い集中復習のサイクル',domains:DOMAINS},
  {title:'試験直前対策',detail:'頻出用語・比較・責任共有モデルの総仕上げ',domains:DOMAINS},
];
function roadmap(plan){
  const weeks=PLAN[plan].weeks;
  if(weeks===8)return BASE8.map((b,i)=>Object.assign({week:i+1},b));
  const r=[];
  for(let w=1;w<=weeks;w++){
    const idx=Math.min(7,Math.floor(((w-1)/(weeks-1))*7));
    r.push(Object.assign({week:w},BASE8[idx]));
  }
  return r;
}
function currentWeek(createdAt,plan){
  const days=diffDays(createdAt,new Date());
  return clamp(Math.floor(days/7)+1,1,PLAN[plan].weeks);
}

   ストア（localStorage = SwiftDataの代替）
   ============================================================ */
const KEY='awsgoukaku_web_v1';
let S = load();
function load(){
  let s=null;
  try{s=JSON.parse(localStorage.getItem(KEY));}catch(e){}
  if(!s)s={profile:null,answers:[],reviewItems:{},meta:{},mockResults:[],dayLogs:{},
          settings:{aiAssistEnabled:false,notificationsEnabled:true}};
  if(!s.setProgress)s.setProgress={};   // 既存データのマイグレーション
  return s;
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}

const store = {
  get profile(){return S.profile;},
  hasOnboarded(){return !!S.profile;},
  createProfile(p){S.profile=p;save();},
  resetAll(){S={profile:null,answers:[],reviewItems:{},meta:{},mockResults:[],dayLogs:{},settings:S.settings};save();},

  recordAnswer(q,correct,isMock){
    S.answers.push({questionId:q.id,domain:q.domain,isCorrect:correct,answeredAt:new Date().toISOString(),isMockExam:!!isMock});
    if(!isMock)store._updateReview(q.id,correct);
    store._logStudy(1);
    save();
  },
  _updateReview(qid,correct){
    const it=S.reviewItems[qid];
    if(it){
      const r=SR.next(it.reviewLevel,correct);
      it.reviewLevel=r.level;it.nextReviewDate=r.nextDate.toISOString();it.lastResultCorrect=correct;
      if(correct&&it.reviewLevel>=4)delete S.reviewItems[qid];
    }else if(!correct){
      const r=SR.next(0,false);
      S.reviewItems[qid]={nextReviewDate:r.nextDate.toISOString(),reviewLevel:0,lastResultCorrect:false,createdAt:new Date().toISOString()};
    }
  },
  dueReviewQuestions(limit){
    limit=limit||100;
    const now=new Date();
    const due=Object.entries(S.reviewItems).filter(([id,it])=>new Date(it.nextReviewDate)<=now)
      .sort((a,b)=>new Date(a[1].nextReviewDate)-new Date(b[1].nextReviewDate)).map(e=>e[0]);
    return due.map(id=>repo.question(id)).filter(Boolean).slice(0,limit);
  },
  get dueReviewCount(){const now=new Date();return Object.values(S.reviewItems).filter(it=>new Date(it.nextReviewDate)<=now).length;},
  get totalReviewCount(){return Object.keys(S.reviewItems).length;},

  isBookmarked(id){return !!(S.meta[id]&&S.meta[id].isBookmarked);},
  toggleBookmark(id){const m=S.meta[id]||(S.meta[id]={isBookmarked:false,note:''});m.isBookmarked=!m.isBookmarked;save();},
  bookmarkedQuestions(){return Object.entries(S.meta).filter(([id,m])=>m.isBookmarked).map(([id])=>repo.question(id)).filter(Boolean);},

  get totalAnswered(){return S.answers.length;},
  correctRateByDomain(){
    const r={};
    for(const d of DOMAINS){
      const inD=S.answers.filter(a=>a.domain===d);
      r[d]=inD.length?inD.filter(a=>a.isCorrect).length/inD.length:0;
    }
    return r;
  },
  answeredCount(d){return S.answers.filter(a=>a.domain===d).length;},
  weakestDomain(){
    const rates=store.correctRateByDomain();
    const ans=DOMAINS.filter(d=>store.answeredCount(d)>=3);
    if(!ans.length)return null;
    return ans.reduce((m,d)=>(rates[d]<rates[m]?d:m));
  },

  saveMockResult(r){S.mockResults.push(r);save();},
  mockResults(){return S.mockResults.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));},
  get latestMockScaledScore(){const m=store.mockResults();return m.length?m[0].scaledScore:null;},

  _logStudy(qs){
    const k=dayKey(new Date());
    const l=S.dayLogs[k]||(S.dayLogs[k]={studiedMinutes:0,questionsAnswered:0});
    l.questionsAnswered+=qs;
  },
  studyDayKeys(){return new Set(Object.keys(S.dayLogs));},
  studyStreak(){
    const days=store.studyDayKeys();
    if(!days.size)return 0;
    let streak=0,cursor=new Date();
    if(!days.has(dayKey(cursor)))cursor=addDays(cursor,-1);
    while(days.has(dayKey(cursor))){streak++;cursor=addDays(cursor,-1);}
    return streak;
  },

  passProbabilityScore(){
    const total=store.totalReviewCount,due=store.dueReviewCount;
    return Pass.score({
      rates:store.correctRateByDomain(),
      mock:store.latestMockScaledScore,
      reviewRate:total===0?1:(total-due)/total,
      streak:store.studyStreak(),
      totalAnswered:store.totalAnswered
    });
  },
  get currentWeek(){const p=S.profile;return p?currentWeek(p.createdAt,p.plan):1;},
  daysUntilExam(){const p=S.profile;return p&&p.targetExamDate?diffDays(new Date(),p.targetExamDate):null;},

  /* ---- 10問セット ---- */
  setStats(set){
    const sp=S.setProgress[set.id];
    const now=new Date();
    const answered=set.questionIds.filter(qid=>S.answers.some(a=>a.questionId===qid)).length;
    const due=set.questionIds.filter(qid=>{const it=S.reviewItems[qid];return it&&new Date(it.nextReviewDate)<=now;}).length;
    return {
      cleared: sp?sp.cleared:false,
      bestCorrect: sp&&sp.attempts>0?sp.bestCorrect:null,
      bestTotal: sp?sp.bestTotal:set.count,
      attempts: sp?sp.attempts:0,
      answered, due, progress: set.count? answered/set.count : 0
    };
  },
  recordSetResult(set,correct,total){
    const sp=S.setProgress[set.id]||(S.setProgress[set.id]={cleared:false,bestCorrect:0,bestTotal:total,attempts:0,lastAttempt:null});
    const prevBest=sp.attempts>0?sp.bestCorrect:null;
    sp.attempts++;
    sp.lastAttempt=new Date().toISOString();
    if(correct>sp.bestCorrect){sp.bestCorrect=correct;sp.bestTotal=total;}
    if(correct>=set.passLine)sp.cleared=true;
    save();
    return {prevBest};
  },
  domainSetSummary(d){
    const sets=SETS_BY_DOMAIN[d];
    const cleared=sets.filter(s=>store.setStats(s).cleared).length;
    return {total:sets.length, cleared};
  },

  todayTasks(){
    const tasks=[];
    const rm=roadmap((S.profile&&S.profile.plan)||'standard8');
    const wg=rm.find(g=>g.week===store.currentWeek)||rm[0];
    const focus=(wg&&wg.domains[0])||'cloudConcepts';
    const lesson=repo.lessons(focus)[0];
    if(lesson)tasks.push({kind:'lesson',title:'レッスン：'+lesson.title,subtitle:'今週のテーマ・約'+lesson.estimatedMinutes+'分',ref:lesson.id});
    tasks.push({kind:'terms',title:'用語カード 5枚',subtitle:DOM[focus].short+'の重要用語',ref:focus});
    tasks.push({kind:'quiz',title:'確認問題 5問',subtitle:DOM[focus].title,ref:focus});
    if(store.dueReviewCount>0)tasks.push({kind:'review',title:'復習 '+Math.min(store.dueReviewCount,10)+'問',subtitle:'間違えた問題の再挑戦',ref:null});
    return tasks;
  }
};

function finalQuestions(){
  let qs=store.dueReviewQuestions();
  const weak=store.weakestDomain();
  if(weak)qs=qs.concat(repo.questions(weak));
  const seen=new Set();let uniq=qs.filter(q=>{if(seen.has(q.id))return false;seen.add(q.id);return true;});
  if(uniq.length<10){
    const extra=shuffle(Q).filter(q=>{if(seen.has(q.id))return false;seen.add(q.id);return true;});

  }
  return uniq.slice(0,15);
}

function scCalendar(s){
  if(!s.monthOffset)s.monthOffset=0;
  const days=store.studyDayKeys();
  const base=new Date();base.setDate(1);
  const disp=new Date(base.getFullYear(),base.getMonth()+s.monthOffset,1);
  let html=appbar('学習カレンダー')+'<div class="screen scroll with-appbar">';
  html+='<div class="card"><div class="flex" style="text-align:center"><div class="grow"><div style="color:var(--orange);font-size:28px">'+icon('flame')+'</div><div style="font-size:22px;font-weight:700;color:var(--navy)">'+store.studyStreak()+'日</div><div class="cap">連続学習</div></div>'+
    '<div style="width:1px;background:var(--line);height:56px"></div>'+
    '<div class="grow"><div style="color:var(--blue);font-size:28px">'+icon('calendar')+'</div><div style="font-size:22px;font-weight:700;color:var(--navy)">'+days.size+'日</div><div class="cap">累計学習日</div></div></div></div>';
  // カレンダー本体
  const y=disp.getFullYear(),m=disp.getMonth();
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(new Date(y,m,d));
  while(cells.length%7)cells.push(null);
  const today=dayKey(new Date());
  html+='<div class="card"><div class="flex between center" style="margin-bottom:8px">'+
    '<button class="iconbtn" style="color:var(--navy);font-size:18px" onclick="calMove(-1)">'+icon('cl')+'</button>'+
    '<span style="font-weight:700;font-size:16px;color:var(--navy)">'+y+'年 '+(m+1)+'月</span>'+
    '<button class="iconbtn" style="color:'+(s.monthOffset>=0?'var(--line)':'var(--navy)')+';font-size:18px" '+(s.monthOffset>=0?'disabled':'onclick="calMove(1)"')+'>'+icon('cr')+'</button></div>';
  html+='<div class="cal">'+['日','月','火','水','木','金','土'].map(w=>'<div class="wd">'+w+'</div>').join('');
  cells.forEach(c=>{
    if(!c){html+='<div class="d"></div>';return;}
    const k=dayKey(c),st=days.has(k),isT=k===today;
    html+='<div class="d'+(st?' s':'')+(isT&&!st?' t':'')+'"><span>'+c.getDate()+'</span></div>';
  });
  html+='</div></div>';
  return html+'</div>';
}

/* ============================================================
   クイズプレイヤー
   ============================================================ */
function startQuiz(title,questions){
  quiz={title,questions:questions||[],index:0,selected:{},submitted:{},result:{},finished:false,set:null};
  render();window.scrollTo(0,0);
}
function startSet(set){
  const qs=shuffle(set.questionIds.map(id=>repo.question(id)).filter(Boolean));
  quiz={title:set.name,questions:qs,index:0,selected:{},submitted:{},result:{},finished:false,set:set};
  render();window.scrollTo(0,0);
}
function quizExit(){quiz=null;render();window.scrollTo(0,0);}
function renderQuiz(){
  const qz=quiz;
  if(qz.finished)return quizSummary();
  if(!qz.questions.length)return appbar(qz.title)+emptyState('list','問題がありません','別の分野を選んでみてください。')+'<div class="screen"><button class="btn-secondary" onclick="quizExit()">戻る</button></div>';
  const q=qz.questions[qz.index];
  const sel=qz.selected[qz.index]||new Set();
  const submitted=!!qz.submitted[qz.index];
  let html='<div class="appbar"><button class="iconbtn" onclick="quizExit()">'+icon('x')+'</button><h1>'+esc(qz.title)+'</h1><div class="spacer"></div></div>';
  html+='<div style="padding:16px 16px 0"><div class="flex between center mb8"><span style="font-weight:600;font-size:13px;color:var(--inkSoft)">'+(qz.index+1)+' / '+qz.questions.length+'問</span>'+domChip(q.domain)+'</div>'+bar(qz.index/qz.questions.length)+'</div>';
  html+='<div class="screen" style="padding-top:16px;padding-bottom:140px">';
  // 問題
  html+='<div class="card">'+(isMulti(q)?'<div class="mb8">'+tagChip('複数選択（'+q.correctAnswers.length+'つ選ぶ）','var(--teal)')+'</div>':'')+
    '<div style="font-size:17px;font-weight:600" class="wrap">'+glossify(q.question)+'</div></div>';
  // 選択肢
  html+='<div class="col gap8 mt12">';
  q.choices.forEach((ch,i)=>{
    let cls='choice',ic='dot';
    const isSel=sel.has(i),isCor=q.correctAnswers.includes(i);
    if(submitted){
      if(isCor){cls+=' correct';ic='seal';}
      else if(isSel){cls+=' wrong';ic='x';}
      else{ic='square';}
    }else if(isSel){cls+=' sel';ic='seal';}
    else{ic='square';}
    html+='<button class="'+cls+'" '+(submitted?'disabled':'onclick="quizToggle('+i+')"')+'>'+icon(ic)+'<span class="grow wrap">'+esc(ch)+'</span></button>';
  });
  html+='</div>';
  // 解説
  if(submitted)html+=quizExplanation(q,sel);
  html+='</div>';
  // 下部
  html+='<div class="bottombar"><div class="row-actions">';
  if(qz.index>0)html+='<button class="btn-secondary" onclick="quizPrev()">'+icon('cl')+'前へ</button>';
  if(!submitted)html+='<button class="btn-primary" '+(sel.size?'':'disabled')+' onclick="quizSubmit()">答え合わせ</button>';
  else html+='<button class="btn-primary" onclick="quizNext()">'+(qz.index+1<qz.questions.length?'次の問題へ':'結果を見る')+' '+icon('ar')+'</button>';
  html+='</div></div>';
  return html;
}
function quizExplanation(q,sel){
  const correct=isCorrectSel(q,sel);
  let html='<div class="card mt12"><div class="flex between center"><span class="flex center gap8" style="font-weight:700;font-size:17px;color:'+(correct?'var(--green)':'var(--red)')+'">'+icon('seal')+(correct?'正解！':'残念、不正解')+'</span>'+
    '<button onclick="quizBookmark()" style="font-size:20px;color:'+(store.isBookmarked(q.id)?'var(--orange)':'var(--inkSoft)')+'">'+icon('star')+'</button></div>';
  html+='<div class="divider" style="margin:12px 0"></div>';
  html+='<div style="font-weight:700;font-size:13px;color:var(--navy);margin-bottom:4px">解説</div><div style="font-size:14px" class="wrap">'+glossify(q.explanation)+'</div>';
  const wrong=q.wrongChoiceExplanations||{};
  if(Object.keys(wrong).length){
    html+='<div style="font-weight:700;font-size:13px;color:var(--inkSoft);margin:10px 0 6px">他の選択肢</div>';
    q.choices.forEach((c,i)=>{if(wrong[String(i)])html+='<div class="flex" style="gap:6px;align-items:flex-start"><span style="color:var(--red);font-weight:700">×</span><span style="font-size:13px" class="wrap">'+glossify(wrong[String(i)])+'</span></div>';});
  }
  if(q.beginnerNote){
    html+='<div class="flex" style="gap:6px;align-items:flex-start;background:var(--orangeSoft);padding:8px;border-radius:8px;margin-top:10px"><span style="color:var(--orange)">'+icon('bulb')+'</span><span style="font-size:13px" class="wrap">'+glossify(q.beginnerNote)+'</span></div>';
  }
  return html+'</div>';
}
function quizToggle(i){
  const qz=quiz,q=qz.questions[qz.index];
  let set=qz.selected[qz.index]||new Set();
  if(isMulti(q)){set.has(i)?set.delete(i):set.add(i);}
  else set=new Set([i]);
  qz.selected[qz.index]=set;render();
}
function quizSubmit(){
  const qz=quiz,q=qz.questions[qz.index];
  if(qz.submitted[qz.index])return;
  qz.submitted[qz.index]=true;
  const correct=isCorrectSel(q,qz.selected[qz.index]||new Set());
  qz.result[qz.index]=correct;
  store.recordAnswer(q,correct,false);
  render();window.scrollTo(0,document.body.scrollHeight);
}
function quizPrev(){if(quiz.index>0){quiz.index--;render();window.scrollTo(0,0);}}
function quizNext(){
  if(quiz.index+1<quiz.questions.length){quiz.index++;render();window.scrollTo(0,0);}
  else{
    if(quiz.set && !quiz._recorded){
      const correct=Object.values(quiz.result).filter(Boolean).length;
      const r=store.recordSetResult(quiz.set,correct,quiz.questions.length);
      quiz._prevBest=r.prevBest;quiz._recorded=true;
    }
    quiz.finished=true;render();window.scrollTo(0,0);
  }
}
function quizBookmark(){store.toggleBookmark(quiz.questions[quiz.index].id);render();}
function quizSummary(){
  const qz=quiz;
  const correct=Object.values(qz.result).filter(Boolean).length;
  const rate=qz.questions.length?correct/qz.questions.length:0;
  if(qz.set)return setResultView(qz,correct,qz.questions.length,rate);
  let html='<div class="appbar"><div class="spacer"></div><h1>'+esc(qz.title)+'</h1><div class="spacer"></div></div><div class="screen" style="text-align:center;padding-top:32px">';
  html+='<div style="display:flex;justify-content:center">'+ring(rate,rate>=.7?'var(--green)':'var(--orange)',Math.round(rate*100)+'%',correct+'/'+qz.questions.length+'問正解',180)+'</div>';
  html+='<p style="font-size:16px;font-weight:600;color:var(--navy);margin-top:24px">'+(rate>=.7?'よくできました！この調子です。':'間違えた問題は復習キューに入りました。')+'</p>';
  if(store.dueReviewCount>0)html+='<div class="cap">復習待ち：'+store.dueReviewCount+'問</div>';
  html+='<div class="mt16"><button class="btn-primary" onclick="quizExit()">'+icon('check')+'終わる</button></div></div>';
  return html;
}

/* セット結果画面（10問セットの達成感演出） */
function setResultView(qz,correct,total,rate){
  const set=qz.set;
  const cleared=correct>=set.passLine;
  const perfect=correct===total && total>0;
  const prev=qz._prevBest;
  const improved=prev!=null && correct>prev;
  const wrongQs=qz.questions.filter((q,i)=>qz.result[i]===false);
  const ringColor=perfect?'var(--orange)':(cleared?'var(--green)':'var(--inkSoft)');

  let html='<div class="appbar"><div class="spacer"></div><h1>'+esc(set.name)+'</h1><div class="spacer"></div></div>';
  html+='<div class="screen" style="text-align:center;padding-top:24px">';
  html+='<div style="display:flex;justify-content:center">'+ring(rate,ringColor,correct+'/'+total,Math.round(rate*100)+'%',180)+'</div>';

  // クリア / 未クリアのバナー
  if(perfect){
    html+='<div class="result-banner perfect"><span style="font-size:24px">'+icon('trophy')+'</span><div><div style="font-weight:800;font-size:18px">満点クリア！</div><div class="cap">全問正解！完璧です</div></div></div>';
  }else if(cleared){
    html+='<div class="result-banner clear"><span style="font-size:24px">'+icon('seal')+'</span><div><div style="font-weight:800;font-size:18px">クリア！</div><div class="cap">合格ライン（'+set.passLine+'問）を突破</div></div></div>';
  }else{
    const need=set.passLine-correct;
    html+='<div class="result-banner miss"><span style="font-size:24px">'+icon('bolt')+'</span><div><div style="font-weight:800;font-size:18px">あと'+need+'問でクリア</div><div class="cap">合格ライン：'+set.passLine+'問正解</div></div></div>';
  }

  // 前回比
  if(prev!=null){
    html+='<div class="card" style="text-align:left"><div class="flex between center"><span class="cap">前回ベスト</span><span style="font-weight:700">'+prev+'問</span></div>'+
      '<div class="flex between center mt8"><span class="cap">今回</span><span style="font-weight:700;color:'+(improved?'var(--green)':'var(--ink)')+'">'+correct+'問'+(improved?' ↑':'')+'</span></div>'+
      (improved?'<div class="flex center gap6 mt8" style="color:var(--green);font-weight:700;font-size:14px">'+icon('trophy')+'自己ベスト更新！</div>':'')+'</div>';
  }

  // ボタン
  html+='<div class="col gap12 mt16">';
  html+='<button class="btn-primary" onclick="startSet(SET_BY_ID[\''+set.id+'\'])">'+icon('refresh')+(cleared?'もう一度挑戦':'再チャレンジ')+'</button>';
  if(wrongQs.length){
    const ids=JSON.stringify(wrongQs.map(q=>q.id));
    html+='<button class="btn-secondary" onclick="startQuiz(\'間違えた問題\',JSON.parse(\''+esc(ids)+'\').map(id=>repo.question(id)).filter(Boolean))">'+icon('alert')+'間違えた'+wrongQs.length+'問を復習</button>';
  }
  html+='<button class="btn-secondary" onclick="quizExit()">'+icon('check')+'セット一覧へ戻る</button>';
  html+='</div></div>';
  return html;
}

/* ============================================================
   模擬試験
   ============================================================ */
function startMock(count,limitSec){
  mock={questions:repo.buildMockExam(count),index:0,answers:{},remaining:limitSec,result:null,timer:null};
  mock.timer=setInterval(()=>{
    if(!mock||mock.result)return;
    mock.remaining--;
    if(mock.remaining<=0){mockFinish();return;}
    const el=document.getElementById('mockTimer');if(el){el.textContent=mockTime();el.style.color=mock.remaining<60?'var(--red)':'var(--navy)';}
  },1000);
  render();window.scrollTo(0,0);
}
function mockTime(){const m=Math.floor(mock.remaining/60),s=mock.remaining%60;return m+':'+String(s).padStart(2,'0');}
function mockExit(){if(mock&&mock.timer)clearInterval(mock.timer);mock=null;back();}
function renderMock(){
  if(mock.result)return mockResultView();
  const q=mock.questions[mock.index];
  const sel=mock.answers[q.id]||new Set();
  let html='<div class="appbar"><button class="iconbtn" style="color:var(--red);font-size:14px;font-weight:600;width:auto" onclick="mockExit()">中断</button>'+
    '<h1 class="flex center gap6" style="justify-content:center"><span style="color:'+(mock.remaining<60?'var(--red)':'var(--navy)')+'">'+icon('timer')+'</span><span id="mockTimer" style="color:'+(mock.remaining<60?'var(--red)':'var(--navy)')+'">'+mockTime()+'</span></h1><div class="spacer"></div></div>';
  html+='<div style="padding:16px 16px 0">'+bar((mock.index+1)/mock.questions.length)+'</div>';
  html+='<div class="screen" style="padding-top:16px;padding-bottom:140px">';
  html+='<div class="flex between center mb8"><span style="font-weight:600;font-size:13px;color:var(--inkSoft)">第'+(mock.index+1)+'問 / '+mock.questions.length+'</span>'+domChip(q.domain)+'</div>';
  html+='<div class="card">'+(isMulti(q)?'<div class="mb8">'+tagChip('複数選択（'+q.correctAnswers.length+'つ）','var(--teal)')+'</div>':'')+'<div style="font-size:17px;font-weight:600" class="wrap">'+glossify(q.question)+'</div></div>';
  html+='<div class="col gap8 mt12">';
  q.choices.forEach((ch,i)=>{const s=sel.has(i);
    html+='<button class="choice'+(s?' sel':'')+'" onclick="mockToggle('+i+')">'+icon(s?'seal':'square')+'<span class="grow wrap">'+esc(ch)+'</span></button>';});
  html+='</div></div>';
  html+='<div class="bottombar"><div class="row-actions">';
  if(mock.index>0)html+='<button class="btn-secondary" onclick="mockPrev()">'+icon('cl')+'前へ</button>';
  if(mock.index+1<mock.questions.length)html+='<button class="btn-primary" onclick="mockNext()">次へ '+icon('cr')+'</button>';
  else html+='<button class="btn-primary" onclick="mockFinish()">'+icon('check')+'採点する</button>';
  html+='</div></div>';
  return html;
}
function mockToggle(i){const q=mock.questions[mock.index];let set=mock.answers[q.id]||new Set();if(isMulti(q)){set.has(i)?set.delete(i):set.add(i);}else set=new Set([i]);mock.answers[q.id]=set;render();}
function mockPrev(){if(mock.index>0){mock.index--;render();window.scrollTo(0,0);}}
function mockNext(){if(mock.index+1<mock.questions.length){mock.index++;render();window.scrollTo(0,0);}}
function mockFinish(){
  if(mock.result)return;
  if(mock.timer)clearInterval(mock.timer);
  let correct=0;const byDom={};
  mock.questions.forEach(q=>{
    const sel=mock.answers[q.id]||new Set();
    const ok=isCorrectSel(q,sel);
    if(ok)correct++;
    const t=byDom[q.domain]||{c:0,t:0};t.t++;if(ok)t.c++;byDom[q.domain]=t;
    store.recordAnswer(q,ok,true);
  });
  const rate=mock.questions.length?correct/mock.questions.length:0;
  const scaled=Math.round(100+rate*900);
  const entries=DOMAINS.filter(d=>byDom[d]).map(d=>({domainRaw:d,correct:byDom[d].c,total:byDom[d].t}));
  const r={id:String(Date.now()),date:new Date().toISOString(),scaledScore:scaled,correctCount:correct,totalCount:mock.questions.length,domainScores:entries};
  store.saveMockResult(r);
  mock.result=r;render();window.scrollTo(0,0);
}
function mockResultView(){
  const r=mock.result,pass=r.scaledScore>=700;
  const rate=r.totalCount?r.correctCount/r.totalCount:0;
  let html='<div class="appbar"><div class="spacer"></div><h1>模擬試験 結果</h1><div class="spacer"></div></div><div class="screen" style="text-align:center;padding-top:24px">';
  html+='<div style="display:flex;justify-content:center">'+ring(r.scaledScore/1000,pass?'var(--green)':'var(--orange)',r.scaledScore,'/ 1000',180)+'</div>';
  html+='<p style="font-size:16px;font-weight:700;color:'+(pass?'var(--green)':'var(--orange)')+';margin-top:16px">'+(pass?'合格ライン（目安700）を超えました！':'合格ライン（目安700）まであと少し')+'</p>';
  html+='<div class="cap">正答 '+r.correctCount+'/'+r.totalCount+'問（'+Math.round(rate*100)+'%）</div>';
  // 分野別
  html+='<div class="card mt16" style="text-align:left"><div style="font-weight:700;font-size:16px;color:var(--navy);margin-bottom:12px">分野別スコア</div>';
  r.domainScores.forEach(e=>{const er=e.total?e.correct/e.total:0;
    html+='<div style="margin-bottom:10px"><div class="flex between center"><span style="font-weight:600;font-size:13px">'+DOM[e.domainRaw].title+'</span><span style="font-size:13px;color:'+(er>=.7?'var(--green)':'var(--orange)')+'">'+e.correct+'/'+e.total+'（'+Math.round(er*100)+'%）</span></div><div class="mt8">'+bar(er,DOM[e.domainRaw].color,8)+'</div></div>';});
  html+='</div>';
  // 次の一手
  const weak=r.domainScores.filter(e=>(e.total?e.correct/e.total:0)<.7).sort((a,b)=>(a.correct/a.total)-(b.correct/b.total));
  const recs=weak.length?weak.slice(0,3).map(e=>'「'+DOM[e.domainRaw].title+'」を重点復習しましょう（正答率'+Math.round((e.correct/e.total)*100)+'%）。'):['安定して合格ラインを超えています。間違えた問題の復習で仕上げましょう。'];
  html+='<div class="card" style="text-align:left"><div style="font-weight:700;font-size:16px;color:var(--navy);margin-bottom:8px">おすすめの次の一手</div>'+
    recs.map(t=>'<div class="flex" style="gap:6px;align-items:flex-start"><span style="color:var(--blue)">'+icon('ar')+'</span><span style="font-size:14px" class="wrap">'+esc(t)+'</span></div>').join('')+'</div>';
  html+='<button class="btn-primary" onclick="mockExit()">'+icon('check')+'終わる</button></div>';
  return html;
}

/* ============================================================
   用語ツールチップ（ホバー：PC ／ タップ：スマホ）
   ============================================================ */
const gtip=document.createElement('div');gtip.id='gtip';document.body.appendChild(gtip);
let gtipFor=null;
function showTip(el){
  const g=GLOSS[+el.getAttribute('data-gi')];if(!g)return;
  gtip.innerHTML='<span class="gt">'+esc(g.term)+'</span>'+esc(g.explanation);
  gtip.classList.add('show');
  const r=el.getBoundingClientRect(),tw=gtip.offsetWidth,th=gtip.offsetHeight;
  let left=Math.max(8,Math.min(r.left+r.width/2-tw/2,window.innerWidth-tw-8));
  let top=r.top-th-10; if(top<8)top=r.bottom+10;
  gtip.style.left=left+'px';gtip.style.top=top+'px';
  gtipFor=el;
}
function hideTip(){gtip.classList.remove('show');gtipFor=null;}
/* PC（ホバー可）はマウスオーバーで表示、スマホ（タッチ）はタップでトグル。
   タッチ端末では合成mouseoverを拾わないようにhoverリスナーを付けない。 */
const HOVERABLE = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
if(HOVERABLE){
  document.addEventListener('mouseover',e=>{const t=e.target.closest&&e.target.closest('.gloss');if(t)showTip(t);});
  document.addEventListener('mouseout',e=>{const t=e.target.closest&&e.target.closest('.gloss');if(t)hideTip();});
}
document.addEventListener('click',e=>{
  const t=e.target.closest&&e.target.closest('.gloss');
  if(t){e.stopPropagation();if(!HOVERABLE){e.preventDefault();gtipFor===t?hideTip():showTip(t);}}
  else hideTip();
},true);
window.addEventListener('scroll',hideTip,true);
window.addEventListener('resize',hideTip);

/* ============================================================
   起動
   ============================================================ */
render();
</script>
