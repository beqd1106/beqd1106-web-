services:
  - type: web
    name: beqd1106-fukushi-api
    runtime: python
    rootDir: render_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Google Sheets連携を有効化する場合のみ、Renderダッシュボードで
      # サービスアカウントのJSON全文を値として設定する（Blueprintには書かない）
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
