name: 歯科情報更新チェック

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 7:00 JST（22:00 UTC）
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 情報更新チェック実行
        run: node .github/scripts/check_dental_news.js

      - name: 変更確認
        id: check_changes
        run: |
          git diff --quiet dental-compass/data/news.json .github/data/url_hashes.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 変更をコミット・プッシュ
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dental-compass/data/news.json .github/data/url_hashes.json
          git commit -m "auto: 歯科情報チェック $(date +'%Y-%m-%d') — 更新検知"
          git push
